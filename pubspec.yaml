name: latlong2
description: Lightweight library for common latitude and longitude calculation
version: 1.0.0-dev.0
homepage: https://github.com/ThexXTURBOXx/dart-latlong
repository: https://github.com/ThexXTURBOXx/dart-latlong
issue_tracker: https://github.com/ThexXTURBOXx/dart-latlong/issues
funding:
  - https://github.com/sponsors/ThexXTURBOXx
screenshots:
  - description: "Latitude and longitude visualisation"
